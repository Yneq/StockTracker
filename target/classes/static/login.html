<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title> 股市 | 會員登入</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: #0a0a0a; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans antialiased">
    <div class="w-full max-w-md px-8">
        <div class="flex justify-center mb-10">
            <div class="flex items-center gap-3 text-white">
                <span class="text-4xl"></span>
                <div>
                    <h1 class="text-3xl font-bold tracking-tighter">股市</h1>
                    <p class="text-xs text-gray-500 -mt-1">專業版</p>
                </div>
            </div>
        </div>

        <div class="bg-gray-900 rounded-3xl p-10 shadow-2xl border border-gray-800">
            <div class="flex bg-gray-800 rounded-2xl p-1 mb-8">
                <button onclick="switchTab(0)" id="tab-login"
                    class="flex-1 py-3 text-sm font-medium rounded-xl tab-active">登入</button>
                <button onclick="switchTab(1)" id="tab-register"
                    class="flex-1 py-3 text-sm font-medium rounded-xl">註冊</button>
            </div>

            <!-- 登入表單 -->
            <div id="login-form">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs text-gray-400 mb-2">Email</label>
                        <input id="login-email" type="email" value="test@example.com"
                               class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-white/50"
                               placeholder="your@email.com">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2">密碼</label>
                        <input id="login-password" type="password" value="123456"
                               class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-white/50"
                               placeholder="••••••••">
                    </div>

                    <button onclick="login()"
                            class="w-full bg-white text-black font-semibold py-4 rounded-2xl hover:bg-gray-200 transition">
                        登入
                    </button>
                </div>

                <div class="text-center mt-6">
                    <p class="text-xs text-emerald-400 font-medium">
                        💡 預設測試帳號： test@example.com / 123456
                    </p>
                    <p class="text-[10px] text-gray-500 mt-1">直接點擊「登入」即可進入系統</p>
                </div>
            </div>

            <!-- 註冊表單 -->
            <div id="register-form" class="hidden">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs text-gray-400 mb-2">使用者名稱</label>
                        <input id="reg-username" type="text" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-white/50" placeholder="Messi">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2">Email</label>
                        <input id="reg-email" type="email" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-white/50" placeholder="your@email.com">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-2">密碼</label>
                        <input id="reg-password" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-white/50" placeholder="••••••••">
                    </div>

                    <button onclick="register()" 
                            class="w-full bg-white text-black font-semibold py-4 rounded-2xl hover:bg-gray-200 transition">
                        建立帳號
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab === 1);
            document.getElementById('register-form').classList.toggle('hidden', tab === 0);
        }

        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) {
                return alert("請輸入 Email 與密碼");
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, password })   // 後端接收的是 username 欄位
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.token);
                    alert(`✅ 登入成功！`);
                    window.location.href = "/index.html";
                } else {
                    alert("❌ Email 或密碼錯誤");
                }
            } catch (e) {
                alert("❌ 連線失敗，請確認後端正在運行");
            }
        }

        async function register() {
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!username || !email || !password) return alert("請填寫所有欄位");

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (res.ok) {
                    alert("✅ 註冊成功！請使用新帳號登入");
                    switchTab(0);
                } else {
                    alert("❌ 註冊失敗（Email 或帳號已存在）");
                }
            } catch (e) {
                alert("❌ 連線失敗");
            }
        }
    </script>
</body>
</html>
